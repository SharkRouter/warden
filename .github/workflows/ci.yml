name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/ -v --timeout=30

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Lint
        run: uvx ruff check warden/

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Warden scans itself via local action
        id: warden
        uses: ./
        with:
          path: .
          format: all
          upload-sarif: 'false'   # self-scan runs on PRs from forks too

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: warden-self-scan
          path: |
            warden_report.json
            warden_report.html
            warden_report.sarif

      - name: Print score
        run: |
          echo "Score: ${{ steps.warden.outputs.score }} / 100 (${{ steps.warden.outputs.level }})"
          echo "Findings: ${{ steps.warden.outputs.findings-count }} (${{ steps.warden.outputs.critical-count }} critical)"
